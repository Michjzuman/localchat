<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>localchat</title>
  <meta name="description" content="localchat">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell" aria-label="localchat">
    <section class="frame">
      <div class="scan" aria-hidden="true"></div>
      <div class="content">
        <h1>localchat</h1>
        <p>the local chat system for linux server collaboration</p>

        <div class="install" aria-label="install command">
          <code id="install-command">curl -fsSL https://localchat.michjzuman.com/install.sh | sudo bash</code>
          <button id="copy-install" type="button" aria-label="Copy install command">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 7h10v13H8z"></path>
              <path d="M5 4h10v3H8v10H5z"></path>
            </svg>
          </button>
        </div>

        <a href="https://github.com/michjzuman/localchat">github.com/michjzuman/localchat</a>
      </div>
    </section>
  </main>

  <script>
    const copyBtn = document.getElementById('copy-install');
    const command = document.getElementById('install-command')?.textContent?.trim() || '';

    if (copyBtn && command) {
      copyBtn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(command);
          copyBtn.classList.add('copied');
          window.setTimeout(() => copyBtn.classList.remove('copied'), 900);
        } catch (_) {
          copyBtn.classList.add('failed');
          window.setTimeout(() => copyBtn.classList.remove('failed'), 900);
        }
      });
    }
  </script>
</body>
</html>
