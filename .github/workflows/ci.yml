name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev

      - name: build
        run: make all

      - name: syntax / lint
        run: make check

      - name: install.sh syntax check
        run: |
          bash -n install.sh
