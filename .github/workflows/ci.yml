name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev

      - name: build
        run: make all

      - name: syntax / lint
        run: make check

      - name: smoke test
        run: make test

      - name: install.sh syntax check
        run: |
          bash -n install.sh
